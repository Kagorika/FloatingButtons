plugins {
    id 'com.android.application'
}

android {
    namespace 'com.floatingbuttons'
    compileSdk 34

    defaultConfig {
        applicationId "com.floatingbuttons"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
}
